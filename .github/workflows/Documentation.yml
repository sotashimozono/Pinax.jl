name: Documentation
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
  statuses: write
  pull-requests: write
  pages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      # Reuse the CI run's Pinax self-test report (from the `Pinax.test() — Pkg.test delegation` job) —
      # `make.jl` carries it into build/test-report/, linked from the "Test → Pinax" page. Waiting for
      # the CI run (not re-running the suite) is what keeps the docs build free of a second test pass.
      - name: Download the Pinax self-test report
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: CI.yml
          name: pinax-report-delegation
          path: pinax-report-dl
          branch: ${{ github.head_ref || github.ref_name }}
          wait_for_completion: true
          if_no_artifact_found: warn
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs/ docs/make.jl
      - name: Trigger GitHub Pages rebuild
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
      - name: Find existing preview comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Docs preview'
      - name: Post preview URL to PR
        if: github.event_name == 'pull_request' && success()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            📚 **Docs preview**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/PR${{ github.event.pull_request.number }}/

            *(updates on each push to this PR)*
          edit-mode: replace
